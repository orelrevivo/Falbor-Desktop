name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        shell: pwsh
        run: |
          if ("${{ secrets.ENV_FILE }}" -ne "") {
            $Env:ENV_FILE | Out-File -FilePath .env -Encoding utf8
            Write-Host "Success: .env file created from secret."
          } else {
            Write-Error "Error: ENV_FILE secret is missing in GitHub Settings!"
            exit 1
          }
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Download Agent Binaries
        run: |
          bun run claude:download
          bun run codex:download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Distribute
        run: bun run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
