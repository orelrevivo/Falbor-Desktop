name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Create .env file
        shell: pwsh
        run: |
          if ($Env:RAW_ENV -and $Env:RAW_ENV.Trim() -ne "") {
            $Env:RAW_ENV | Out-File -FilePath .env -Encoding utf8
            Write-Host "Success: .env file created from secret."
          } else {
            Write-Error "Error: The secret named 'ENV_FILE' was not found or is empty in GitHub Settings!"
            exit 1
          }
        env:
          RAW_ENV: ${{ secrets.ENV_FILE }}

      - name: Install dependencies
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Download Agent Binaries
        run: |
          bun run claude:download
          bun run codex:download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Distribute
        run: bun run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true
          DEBUG: electron-builder
